<style>
.mode-landscape .sl-layout { flex-direction: row; }
.mode-portrait .sl-layout { flex-direction: column; }
.mode-landscape .sl-visual { width: 44%; min-width: 44%; }
.mode-portrait .sl-visual { width: 100%; height: 38%; }
</style>
<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-layout flex h-full">

    <!-- Left: content column -->
    <div class="flex flex-col justify-between p-12 flex-1">

      <!-- Top badge -->
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-indigo-500"></div>
        <span class="text-xs font-semibold tracking-widest text-slate-400 uppercase">Personal · Web</span>
      </div>

      <!-- Hero copy -->
      <div>
        <p class="text-sm font-semibold text-indigo-500 mb-4 tracking-widest uppercase">Landing Page</p>
        <h1 class="text-7xl font-extrabold text-slate-900 leading-none mb-6 tracking-tight">{{config.appName}}</h1>
        <p class="text-base text-slate-500 max-w-xs leading-relaxed">{{config.tagline}}</p>
        <div class="mt-8 flex items-center gap-3">
          <div class="h-px w-10 bg-indigo-400"></div>
          <span class="text-xs text-slate-400 tracking-wide">One section · One message</span>
        </div>
      </div>

      <!-- Attribution -->
      <div>
        <data-attribution />
      </div>
    </div>

    <!-- Right: visual panel -->
    <div class="sl-visual bg-slate-900 flex flex-col items-center justify-center overflow-hidden relative">
      <img
        src="http://localhost:8001/common/image-generation?prompt=minimal%20editorial%20personal%20greeting%20page%2C%20clean%20bold%20typography%20on%20dark%20background%2C%20warm%20indigo%20accent%20light%2C%20calm%20and%20premium"
        alt="Hello Orias visual"
        class="w-full h-full object-cover opacity-80"
      />
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-4xl font-bold text-white tracking-tight drop-shadow-lg">Hello Orias</span>
      </div>
    </div>

  </div>
</section>
